trigger:
  branches:
    include:
      - main
  paths:
    include:
      - kanban-backend/**

pool:
  name: Default

variables:
  acrLoginServer: sprjacr.azurecr.io
  imageName: kanban-backend
  containerAppName: sprj-ca-kanban-backend
  resourceGroup: sprj-rg
  azureServiceConnection: azure-sprj-sc

stages:

- stage: Build
  displayName: Build e Push para ACR
  jobs:
  - job: BuildAndPush
    displayName: Maven Build + Docker Push
    steps:

    - task: Maven@4
      displayName: Maven Package
      inputs:
        mavenPomFile: kanban-backend/pom.xml
        goals: package
        options: -DskipTests
        publishJUnitResults: false
        javaHomeOption: Default

    - task: AzureCLI@2
      displayName: Build e Push Docker para ACR
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name sprjacr
          docker build `
            -f kanban-backend/src/main/docker/Dockerfile.jvm `
            -t $(acrLoginServer)/$(imageName):$(Build.BuildId) `
            -t $(acrLoginServer)/$(imageName):latest `
            kanban-backend
          docker push $(acrLoginServer)/$(imageName):$(Build.BuildId)
          docker push $(acrLoginServer)/$(imageName):latest

- stage: Deploy
  displayName: Deploy no Container App
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: Atualizar Container App
    steps:

    - task: AzureCLI@2
      displayName: Deploy nova imagem
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: |
          az containerapp update `
            --name $(containerAppName) `
            --resource-group $(resourceGroup) `
            --image $(acrLoginServer)/$(imageName):$(Build.BuildId) `
            --registry-server $(acrLoginServer) `
            --registry-identity system
