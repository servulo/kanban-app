# ── Datasource ────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=mssql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}

%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=SprjAuth@2025
%dev.quarkus.datasource.jdbc.url=jdbc:sqlserver://localhost:1433;databaseName=sprj_kanban;encrypt=false;trustServerCertificate=true

# ── Hibernate ─────────────────────────────────────────────────────────────────
quarkus.hibernate-orm.schema-management.strategy=none
%dev.quarkus.hibernate-orm.log.sql=true

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# ── HTTP ──────────────────────────────────────────────────────────────────
%dev.quarkus.http.port=8082

# ── OIDC ──────────────────────────────────────────────────────────────────────
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
quarkus.oidc.application-type=service
quarkus.http.auth.proactive=false
quarkus.oidc.token.introspection-enabled=false
quarkus.oidc.roles.role-claim-path=realm_access/roles

%dev.quarkus.oidc.auth-server-url=http://localhost:8080/realms/sprj

# ── CORS ──────────────────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

%dev.quarkus.http.cors.origins=http://localhost:4200

# ── Azure Blob Storage ────────────────────────────────────────────────────────
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING}
azure.storage.container-name=kanban-app

%dev.azure.storage.connection-string=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tiqIU1s+VJoqggJkb==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;
